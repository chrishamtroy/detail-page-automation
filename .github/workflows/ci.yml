name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest mypy

      - name: Lint — mypy type check
        run: python -m mypy src/ --ignore-missing-imports

      - name: Unit tests
        run: python -m pytest tests/ -v -m "not integration"
