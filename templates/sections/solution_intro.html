<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 1200px; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
  .section-wrapper { width: 1200px; min-height: 600px; position: relative; overflow: hidden; background: #fff; }
  .bg-image { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; opacity: 0.15; }
  .content { position: relative; z-index: 2; }
</style>
</head>
<body>
<div class="section-wrapper">
  <img src="{{ background }}" class="bg-image" alt="">
  <div class="content px-20 py-16 flex flex-col items-center">
    <p class="text-gray-500 text-lg mb-4">{{ copy.intro }}</p>
    <h2 class="text-5xl font-black mb-4 text-center" style="color: {{ color_secondary }};">{{ copy.product_name }}</h2>
    <div class="w-24 h-1 rounded-full mb-8" style="background: {{ color_primary }};"></div>
    <p class="text-2xl text-center font-bold text-gray-700 max-w-3xl mb-12 leading-relaxed">{{ copy.one_liner }}</p>
    <div class="px-10 py-6 rounded-2xl border-2 text-center max-w-xl" style="border-color: {{ color_primary }}; background: {{ color_primary }}10;">
      <p class="text-sm text-gray-500 font-bold tracking-widest mb-2">이런 분께 딱 맞습니다</p>
      <p class="text-lg font-bold" style="color: {{ color_secondary }};">{{ copy.target_fit }}</p>
    </div>
  </div>
</div>
</body>
</html>
