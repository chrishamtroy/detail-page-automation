<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 1200px; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
  .section-wrapper { width: 1200px; min-height: 550px; position: relative; overflow: hidden; background: #fafafa; }
  .bg-image { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; opacity: 0.08; }
  .content { position: relative; z-index: 2; }
</style>
</head>
<body>
<div class="section-wrapper">
  <img src="{{ background }}" class="bg-image" alt="">
  <div class="content px-20 py-12">
    <h2 class="text-center text-4xl font-black mb-10" style="color: {{ color_secondary }};">{{ copy.headline }}</h2>
    <div class="grid grid-cols-2 gap-8">
      <div class="bg-white rounded-2xl p-8 shadow-sm border-t-4" style="border-color: {{ color_primary }};">
        <h3 class="font-black text-lg mb-6" style="color: {{ color_primary }};">{{ copy.recommended.title }}</h3>
        <div class="flex flex-col gap-3">
          {% for item in copy.recommended.items %}
          <div class="flex items-center gap-3">
            <span class="text-green-500">✓</span>
            <p class="text-gray-700">{{ item }}</p>
          </div>
          {% endfor %}
        </div>
      </div>
      <div class="bg-white rounded-2xl p-8 shadow-sm border-t-4 border-gray-300">
        <h3 class="font-black text-lg mb-6 text-gray-500">{{ copy.not_recommended.title }}</h3>
        <div class="flex flex-col gap-3">
          {% for item in copy.not_recommended.items %}
          <div class="flex items-center gap-3">
            <span class="text-gray-400">✕</span>
            <p class="text-gray-400">{{ item }}</p>
          </div>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
