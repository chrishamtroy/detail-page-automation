<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 1200px; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
  .section-wrapper { width: 1200px; min-height: 600px; position: relative; overflow: hidden; background: #f0f7ff; }
  .bg-image { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; opacity: 0.12; }
  .content { position: relative; z-index: 2; }
</style>
</head>
<body>
<div class="section-wrapper">
  <img src="{{ background }}" class="bg-image" alt="">
  <div class="content px-20 py-14">
    <div class="text-center mb-10">
      <div class="text-6xl mb-4">🛡️</div>
      <h2 class="text-4xl font-black mb-4 text-blue-900">{{ copy.guarantee_headline }}</h2>
      <p class="text-gray-600 text-lg max-w-2xl mx-auto leading-relaxed">{{ copy.guarantee_body }}</p>
    </div>
    <div class="grid grid-cols-3 gap-5">
      {% for faq in copy.faqs %}
      <div class="bg-white rounded-xl p-6 shadow-sm">
        <p class="font-black text-sm mb-3 text-blue-900">Q. {{ faq.question }}</p>
        <p class="text-gray-600 text-sm leading-relaxed">{{ faq.answer }}</p>
      </div>
      {% endfor %}
    </div>
  </div>
</div>
</body>
</html>
