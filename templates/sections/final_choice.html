<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 1200px; font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
  .section-wrapper { width: 1200px; min-height: 600px; position: relative; overflow: hidden; background: #0f0f1a; }
  .bg-image { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; opacity: 0.3; }
  .content { position: relative; z-index: 2; }
</style>
</head>
<body>
<div class="section-wrapper">
  <img src="{{ background }}" class="bg-image" alt="">
  <div class="content px-16 py-14">
    <h2 class="text-center text-white text-4xl font-black mb-12">{{ copy.headline }}</h2>
    <div class="grid grid-cols-2 gap-8 mb-10">
      <div class="bg-gray-900 border border-gray-700 rounded-2xl p-8">
        <h3 class="text-gray-400 font-bold text-center mb-5 text-sm tracking-widest">이대로 계속하면</h3>
        <div class="flex flex-col gap-3">
          {% for item in copy.without %}
          <div class="flex items-center gap-3">
            <span class="text-red-500 text-lg">✕</span>
            <p class="text-gray-400">{{ item }}</p>
          </div>
          {% endfor %}
        </div>
      </div>
      <div class="rounded-2xl p-8 border-2" style="background: {{ color_primary }}15; border-color: {{ color_primary }};">
        <h3 class="font-bold text-center mb-5 text-sm tracking-widest" style="color: {{ color_primary }};">선택 후 달라지는 것</h3>
        <div class="flex flex-col gap-3">
          {% for item in copy.with %}
          <div class="flex items-center gap-3">
            <span class="text-green-400 text-lg">✓</span>
            <p class="text-white font-bold">{{ item }}</p>
          </div>
          {% endfor %}
        </div>
      </div>
    </div>
    <p class="text-center text-2xl font-black text-white">{{ copy.question }}</p>
  </div>
</div>
</body>
</html>
